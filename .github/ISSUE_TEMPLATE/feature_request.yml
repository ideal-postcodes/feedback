name: Feature request
description: Suggest a new feature or change
labels: ["enhancement", "needs-triage"]
body:
  - type: dropdown
    id: product
    attributes:
      label: Product
      description: Which product is this about?
      options:
        - "CLI (@ideal-postcodes/cli)"
        - "Ideal Postcodes API"
        - "Address Finder Library"
        - "Postcode Lookup Library"
        - "Agent skills (@ideal-postcodes/skills)"
        - "Documentation (docs.ideal-postcodes.co.uk)"
        - "Other / not sure"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the underlying problem, not just the proposed solution. The clearer the problem, the better we can evaluate solutions.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Be as specific as you can — flag names, response shape, behaviour.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternatives have you tried or considered?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps — use case, scale, integration details.
    validations:
      required: false
